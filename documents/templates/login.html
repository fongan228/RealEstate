<!DOCTYPE html>
<html>
<head>
    <title>EstateScan AI</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div class="min-h-screen flex flex-col">

    <!-- Верхняя картинка -->
    <div class="h-60 bg-cover bg-center"
         style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab');">
    </div>

    <!-- Форма -->
    <div class="flex-1 flex items-center justify-center">
        <div class="w-full max-w-sm px-6">

            <h1 class="text-3xl font-bold text-center mb-6">Login</h1>

            <form>
                <input type="email"
                       placeholder="Email"
                       class="w-full mb-4 px-4 py-3 rounded-lg bg-gray-800 border border-gray-600 focus:outline-none">

                <input type="password"
                       placeholder="Password"
                       class="w-full mb-4 px-4 py-3 rounded-lg bg-gray-800 border border-gray-600 focus:outline-none">

                <p class="text-center text-gray-400 text-sm mb-4">
                    Register / Sign up
                </p>

                <a href="/dashboard/">
                    <button type="button"
                            class="w-full py-3 bg-gray-700 rounded-lg hover:bg-gray-600">
                        Login
                    </button>
                </a>
            </form>

        </div>
    </div>

</div>

</body>
</html>
